name: Merge PR Leaderboard Update

on:
  pull_request:
    types: [closed]
  workflow_dispatch: # THE EMERGENCY BUTTON

permissions:
  contents: write # Allows the bot to push changes

jobs:
  update_after_merge:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using GITHUB_TOKEN is fine, but ensure the Action has write permissions in repo settings

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f baseline_code/requirements.txt ]; then pip install -r baseline_code/requirements.txt; fi

      - name: Run Hidden Evaluation
        run: |
          mkdir -p outputs
          python hidden_evaluation/evaluator.py

      - name: Read Score
        id: score_step
        run: |
          SCORE=$(python -c "import json; print(json.load(open('outputs/evaluation_result.json'))['final_score'])")
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Commit Leaderboard and Archive Submission
        run: |
          # 1. Set up Git Identity (Standard GitHub Bot Identity)
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 2. Determine Username
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            USER_NAME="Admin_Manual"
            PR_NUM="N/A"
          else
            USER_NAME="${{ github.event.pull_request.user.login }}"
            PR_NUM="${{ github.event.pull_request.number }}"
          fi
          
          # 3. Pull latest changes to avoid "Rejected" push errors
          git pull origin main --rebase
          
          # 4. Run your python update logic
          # Ensure your python path includes the current directory
          export PYTHONPATH=$PYTHONPATH:.
          python -c "from leaderboard.update_leaderboard import update_leaderboard; update_leaderboard('$USER_NAME', '$PR_NUM', ${{ steps.score_step.outputs.score }})"
          
          # 5. Archive the code
          SUB_FOLDER="participant_submissions/${USER_NAME}"
          mkdir -p "$SUB_FOLDER"
          cp baseline_code/recommender.py "$SUB_FOLDER/recommender_$(date +%Y%m%d_%H%M%S).py"
          
          # 6. Push changes
          git add leaderboard/ participant_submissions/
          git commit -m "🏆 Score: ${{ steps.score_step.outputs.score }} for $USER_NAME" || echo "No changes to commit"
          git push origin main
